version: '3.8'

x-cluster-env: &cluster-env
  JWT_SECRET: ${JWT_SECRET:-changeme-dev-secret}
  CLUSTER_TOKEN: ${CLUSTER_TOKEN:-changeme-dev-cluster}

x-datanode-healthcheck: &dn-healthcheck
  test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
  interval: 10s
  timeout: 5s
  retries: 3

services:
  namenode:
    build: ./namenode
    environment:
      <<: *cluster-env
    ports:
      - "8000:8000"
    volumes:
      - namenode_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  datanode1:
    build: ./datanode
    environment:
      <<: *cluster-env
      DATANODE_ID: datanode1
      NAMENODE_URL: http://namenode:8000
      REPORTED_HOST: localhost
      REPORTED_PORT: 8001
      BLOCK_SIZE_MB: 64
    ports:
      - "8001:8000"
    volumes:
      - dn1_data:/app/data
    depends_on:
      namenode:
        condition: service_healthy
    healthcheck: *dn-healthcheck

  datanode2:
    build: ./datanode
    environment:
      <<: *cluster-env
      DATANODE_ID: datanode2
      NAMENODE_URL: http://namenode:8000
      REPORTED_HOST: localhost
      REPORTED_PORT: 8002
      BLOCK_SIZE_MB: 64
    ports:
      - "8002:8000"
    volumes:
      - dn2_data:/app/data
    depends_on:
      namenode:
        condition: service_healthy
    healthcheck: *dn-healthcheck

  datanode3:
    build: ./datanode
    environment:
      <<: *cluster-env
      DATANODE_ID: datanode3
      NAMENODE_URL: http://namenode:8000
      REPORTED_HOST: localhost
      REPORTED_PORT: 8003
      BLOCK_SIZE_MB: 64
    ports:
      - "8003:8000"
    volumes:
      - dn3_data:/app/data
    depends_on:
      namenode:
        condition: service_healthy
    healthcheck: *dn-healthcheck

volumes:
  namenode_data:
  dn1_data:
  dn2_data:
  dn3_data:
